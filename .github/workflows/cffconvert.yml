name: cffconvert

on:
  push:
    paths:
      - CITATION.cff

permissions:
  contents: write

jobs:
  normalize-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Normalize CITATION.cff
        run: |
          set -e
          DATE=$(date +%Y-%m-%d)
          echo "Normalizing CITATION.cff to date-released: ${DATE} and quoting URLs"

          # Normalize date-released to YYYY-MM-DD (handle ISO timestamps too)
          sed -E -i "s/^date-released:.*/date-released: \"${DATE}\"/" CITATION.cff || true

          # Ensure common URL-like fields are quoted so YAML preserves them exactly
          sed -E -i 's/^( *repository-code:\s*)"?([^\"]+)"?/\1"\2"/' CITATION.cff || true
          sed -E -i 's/^( *orcid:\s*)"?([^\"]+)"?/\1"\2"/' CITATION.cff || true
          # sed -E -i 's/^( *value:\s*)"?([^\"]+)"?/\1"\2"/' CITATION.cff || true

      - name: Validate CITATION.cff
        uses: citation-file-format/cffconvert-github-action@2.0.0
        with:
          args: "--validate"

      - name: Commit normalized CITATION.cff if needed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CITATION.cff

          if git diff --cached --quiet; then
            echo "No CITATION.cff changes needed."
          else
            git commit -m "chore: normalize CITATION.cff formatting (date/quotes)"
            git push
          fi
