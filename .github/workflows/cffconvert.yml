name: cffconvert

on:
  push:
    paths:
      - CITATION.cff

permissions:
  contents: write
  pull-requests: write

jobs:
  normalize-and-propose:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Normalize CITATION.cff
        run: |
          set -e
          DATE=$(date +%Y-%m-%d)
          echo "Normalizing CITATION.cff to date-released: ${DATE} and quoting URLs"

          sed -E -i "s/^date-released:.*/date-released: \"${DATE}\"/" CITATION.cff || true
          sed -E -i 's/^( *repository-code:\s*)"?([^\"]+)"?/\1"\2"/' CITATION.cff || true
          sed -E -i 's/^( *orcid:\s*)"?([^\"]+)"?/\1"\2"/' CITATION.cff || true

      - name: Validate CITATION.cff
        uses: citation-file-format/cffconvert-github-action@2.0.0
        with:
          args: "--validate"

      - name: Create normalization PR if needed
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: normalize CITATION.cff formatting (date/quotes)"
          branch: "normalize-citation/${{ github.run_id }}"
          title: "chore: Normalize CITATION.cff formatting"
          body: |
            Automated normalization of `CITATION.cff` to keep `date-released` in YYYY-MM-DD format and preserve quoted URL scalars.
          labels: automation
          base: main
          draft: false
