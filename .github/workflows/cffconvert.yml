name: cffconvert

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - CITATION.cff

permissions:
  contents: write

jobs:
  validate-and-fix-release-pr:
    if: startsWith(github.head_ref, 'release-please--branches--main')
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Normalize CITATION.cff
        run: |
          set -e
          DATE=$(date +%Y-%m-%d)
          echo "Normalizing CITATION.cff to date-released: ${DATE} and quoting URLs"

          sed -E -i "s/^date-released:.*/date-released: \"${DATE}\"/" CITATION.cff || true
          sed -E -i 's/^( *repository-code:\s*)"?([^\"]+)"?/\1"\2"/' CITATION.cff || true
          sed -E -i 's/^( *orcid:\s*)"?([^\"]+)"?/\1"\2"/' CITATION.cff || true

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CITATION.cff

          if git commit -m "chore: normalize CITATION.cff formatting (date/quotes)"; then
            git push
          else
            echo "No normalization changes needed."
          fi

      - name: Validate CITATION.cff
        uses: citation-file-format/cffconvert-github-action@2.0.0
        with:
          args: "--validate"
